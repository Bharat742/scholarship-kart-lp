<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us Footer</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }

        /* Main Contact Section Padding */
        .contact-section {
            padding: 80px 0 60px 0;
        }

        /* Typography */
        .contact-title {
            font-weight: 800;
            font-size: 2rem;
            color: #000000;
            margin-bottom: 15px;
        }

        .contact-subtitle {
            color: #557298;
            font-size: 1rem;
            margin-bottom: 50px;
        }

        /* Minimalist Input Fields */
        .contact-form {
            max-width: 800px;
            margin: 0 auto;
        }

        .minimal-input {
            width: 100%;
            border: none;
            border-bottom: 1.5px solid #8ba4b4;
            border-radius: 0;
            padding: 10px 5px 15px 5px;
            font-size: 1rem;
            color: #333333;
            background-color: transparent;
            outline: none;
            transition: border-color 0.3s ease;
        }

        /* Placeholder color styling */
        .minimal-input::placeholder {
            color: #8ba4b4;
            font-weight: 400;
        }

        /* Focus state for inputs */
        .minimal-input:focus {
            border-bottom: 2px solid #1e4b7a; /* Darker blue on focus */
            box-shadow: none;
        }

        /* Talk to Expert Button / Link */
        .btn-talk-expert {
            background: transparent;
            border: none;
            color: #1e4b7a;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            padding: 15px 30px;
            margin-top: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s ease;
            text-transform: uppercase;
        }

        .btn-talk-expert:hover {
            color: #00a0df; /* Lighter blue on hover */
        }

        .btn-talk-expert i {
            font-weight: 300;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        /* Arrow hover effect */
        .btn-talk-expert:hover i {
            transform: translateX(5px);
        }

        /* Bottom Copyright Strip */
        .copyright-strip {
            background-color: #312e59; /* Deep Purple to match your theme */
            padding: 20px 0;
            text-align: center;
        }

        .copyright-strip p {
            margin: 0;
            color: #e0e0e0;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* Responsive spacing for mobile */
        @media (max-width: 768px) {
            .contact-form .row > div {
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>

    <section class="contact-section">
        <div class="container text-center">
            
            <h2 class="contact-title">Contact Us</h2>
            <p class="contact-subtitle">Trained by the globally recognised universities to help students secure admissions faster.</p>

            <form class="contact-form">
                <div class="row gx-5">
                    
                    <div class="col-md-6">
                        <input type="text" class="minimal-input" placeholder="Name" required>
                    </div>

                    <div class="col-md-6 mt-4 mt-md-0">
                        <input type="email" class="minimal-input" placeholder="Email" required>
                    </div>

                </div>

                <button type="submit" class="btn-talk-expert">
                    Talk to Expert <i class="fa-solid fa-arrow-right-long"></i>
                </button>
            </form>

        </div>
    </section>

    <div class="copyright-strip">
        <p>Copyright 2025 Scholarshipkart</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
