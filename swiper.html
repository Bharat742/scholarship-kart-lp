<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Destinations</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            overflow-x: hidden;
        }

        .destinations-section {
            padding: 80px 0;
        }

        /* Header Styling */
        .section-title {
            font-weight: 800;
            font-size: 2rem;
            color: #000;
            margin-bottom: 10px;
        }

        .section-subtitle {
            color: #557298;
            font-size: 0.95rem;
            margin-bottom: 60px;
        }

        /* Swiper Container */
        .swiper-container {
            width: 100%;
            padding-top: 50px; /* Space for the floating flag badge */
            padding-bottom: 30px;
            overflow: visible; /* Allows scaling active slide to pop out */
        }

        /* Individual Slide Styling */
        .swiper-slide {
            transition: all 0.4s ease;
            transform: scale(0.9); /* Default scale for inactive slides */
            opacity: 0.85;
            height: auto;
            display: flex;
            justify-content: center;
        }

        /* Active Slide Scaling Effect */
        .swiper-slide.swiper-slide-active {
            transform: scale(1.1); /* Enlarges the first/active slide */
            opacity: 1;
            z-index: 2;
        }

        /* Card Container */
        .destination-card {
            position: relative;
            width: 100%;
            height: 220px;
            border-radius: 20px;
            background-color: #eee;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Background Image inside Card */
        .card-bg-img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            position: relative;
        }

        /* Dark Gradient Overlay for Text Readability */
        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(16, 24, 65, 0.9), transparent);
            border-radius: 0 0 20px 20px;
        }

        /* Card Title */
        .card-title {
            position: absolute;
            bottom: 15px;
            left: 20px;
            right: 20px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            margin: 0;
            text-align: center;
        }

        /* Floating Circle Flag Badge */
        .flag-badge {
            position: absolute;
            top: -30px; /* Pulls it halfway out of the card */
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #dcdcdc;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            z-index: 10;
            transition: all 0.4s ease;
        }

        /* Ensure active slide flag scales proportionally */
        .swiper-slide-active .flag-badge {
            transform: translateX(-50%) scale(0.9); /* Normalizes the badge size slightly since the parent scaled up */
        }

        .flag-badge img {
            width: 32px;
            border-radius: 2px;
        }
        
    </style>
</head>
<body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

    <script>
     const studySwiper = new Swiper('.study-main-swiper', {
    loop: true,
    centeredSlides: false,    
    grabCursor: true,

    breakpoints: {
        320: { slidesPerView: 1.5, spaceBetween: 20 },
        768: { slidesPerView: 2.5, spaceBetween: 30 },
        1024: { slidesPerView: 3.5, spaceBetween: 35 },
        1200: { slidesPerView: 4.5, spaceBetween: 40 }
    }
});
    </script>
</body>
