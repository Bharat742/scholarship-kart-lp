<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Partners</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fafafa; /* Slight off-white to make the white cards pop */
            overflow-x: hidden;
        }

        .partners-section {
            padding: 80px 0;
            background-color: #fcfcfc;
        }

        /* Header Styling */
        .section-title {
            font-weight: 800;
            font-size: 2rem;
            color: #000;
            margin-bottom: 10px;
        }

        .section-subtitle {
            color: #557298;
            font-size: 0.95rem;
            margin-bottom: 50px;
        }

        /* Swiper Container & Wrapper configurations for continuous scroll */
        .swiper-container {
            width: 100%;
            padding: 15px 0;
        }

        /* This is the magic CSS that makes the Swiper scroll continuously without snapping */
        .swiper-wrapper {
            transition-timing-function: linear !important; 
        }

        /* Logo Card Styling */
        .partner-card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.04);
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border: 1px solid rgba(0,0,0,0.02);
            transition: box-shadow 0.3s ease;
        }

        .partner-card:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .partner-card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .partner-card:hover img {
            opacity: 1;
        }

        /* Adding a bit of space between the two rows */
        .bottom-row {
            margin-top: 15px;
        }

    </style>
</head>
<body>

    <section class="partners-section">
        <div class="container text-center">
            <h2 class="section-title">Our Partners</h2>
            <p class="section-subtitle">Trained by the globally recognised universities to help students secure admissions faster.</p>
        </div>

        <div class="container-fluid px-0">
            
            <div class="swiper swiper-container top-swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/2560px-Google_2015_logo.svg.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/IBM_logo.svg/2560px-IBM_logo.svg.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Amazon_logo.svg/2560px-Amazon_logo.svg.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Microsoft_logo.svg/2560px-Microsoft_logo.svg.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Cisco_logo_blue_2016.svg/2560px-Cisco_logo_blue_2016.svg.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Facebook_logo_%28square%29.png/800px-Facebook_logo_%28square%29.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/2560px-Google_2015_logo.svg.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/IBM_logo.svg/2560px-IBM_logo.svg.png" alt="Partner"></div></div>
                </div>
            </div>

            <div class="swiper swiper-container bottom-swiper bottom-row">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Tesla_logo.png/800px-Tesla_logo.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Bootstrap_logo.svg/800px-Bootstrap_logo.svg.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/React-icon.svg/2300px-React-icon.svg.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/Vue.js_Logo_2.svg/2367px-Vue.js_Logo_2.svg.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Tailwind_CSS_Logo.svg/2048px-Tailwind_CSS_Logo.svg.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/HTML5_logo_and_wordmark.svg/2048px-HTML5_logo_and_wordmark.svg.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Tesla_logo.png/800px-Tesla_logo.png" alt="Partner"></div></div>
                    <div class="swiper-slide"><div class="partner-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Bootstrap_logo.svg/800px-Bootstrap_logo.svg.png" alt="Partner"></div></div>
                </div>
            </div>

        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

    <script>
        // Common Swiper Configuration for a smooth, continuous marquee effect
        const swiperConfig = {
            spaceBetween: 20,
            centeredSlides: true,
            speed: 4000, // Duration of transition between slides (adjust for speed)
            autoplay: {
                delay: 0, // No delay between transitions
                disableOnInteraction: false, // Keeps autoplay running even if user clicks/swipes
            },
            loop: true,
            slidesPerView: 'auto',
            allowTouchMove: false, // Prevents user dragging which interrupts the linear flow
            breakpoints: {
                320: { slidesPerView: 2.5 },
                576: { slidesPerView: 3.5 },
                768: { slidesPerView: 4.5 },
                1024: { slidesPerView: 5.5 },
                1200: { slidesPerView: 6.5 }
            }
        };

        // Initialize Top Swiper (Scrolls Left by default)
        const topSwiper = new Swiper('.top-swiper', {
            ...swiperConfig
        });

        // Initialize Bottom Swiper (Scrolls Right)
        const bottomSwiper = new Swiper('.bottom-swiper', {
            ...swiperConfig,
            autoplay: {
                delay: 0,
                disableOnInteraction: false,
                reverseDirection: true // This is the key setting that reverses the flow
            }
        });
    </script>
</body>
</html>
